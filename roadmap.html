<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Roadmap Hub - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#4facfe,#00f2fe,#43e97b);
    overflow:hidden;
}

body::before{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(255,255,255,.15);
    border-radius:50%;
    top:-120px;
    left:-100px;
}

body::after{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:rgba(255,255,255,.12);
    border-radius:50%;
    bottom:-150px;
    right:-120px;
}

.login-box{
    position:relative;
    width:400px;
    padding:40px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(18px);
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
    text-align:center;
    color:#fff;
    z-index:1;
}

.logo{
    font-size:60px;
}

h1{
    margin-top:10px;
    font-size:30px;
}

.subtitle{
    margin:8px 0 30px;
    color:#f1f1f1;
    font-size:15px;
}

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,.25);
    color:white;
    font-size:15px;
}

.input-box input::placeholder{
    color:#eee;
}

.options{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:25px;
}

.options a{
    color:white;
    text-decoration:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:white;
    color:#2193b0;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    background:#f3f3f3;
}

.signup{
    margin-top:25px;
    font-size:14px;
}

.signup a{
    color:#fff;
    font-weight:bold;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="login-box">

<div class="logo">🎓</div>

<h1>Student Roadmap Hub</h1>

<p class="subtitle">
Your journey to success starts here.
</p>

<form>

<div class="input-box">
<input type="email" placeholder="Student Email" required>
</div>

<div class="input-box">
<input type="password" placeholder="Password" required>
</div>

<div class="options">
<label>
<input type="checkbox">
 Remember Me
</label>

<a href="#">Forgot Password?</a>
</div>

<button type="submit">Login</button>

<div class="signup">
New Student?
<a href="#">Create Account</a>
</div>

</form>

</div>

</body>
</html>
